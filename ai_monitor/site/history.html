ctive_url": "https://github.com/open-webui/open-webui/releases.atom", "target_url": "https://github.com/open-webui/open-webui/releases/tag/v0.9.2", "category": "release", "headline_en": "Open WebUI release feed now shows v0.9.2", "summary_en": "The monitored release feed for Open WebUI changed and the newest visible tag is v0.9.2. The feed timestamp is 2026-04-24T09:56:14Z. This looks like a release-level update rather than a cosmetic page edit.", "headline_zh": "", "summary_zh": "", "evidence_excerpt": "title=v0.9.2 updated=2026-04-24T09:56:14Z link=https://github.com/open-webui/open-webui/releases/tag/v0.9.2 summary= content=Added 🧠 PaddleOCR-vl document extraction. Administrators can now use PaddleOCR-vl as a content extraction engine for document processing, with configurable API URL and token settings in document retrieval configuration. #23945 🔥 Firecrawl v2 API. Firecrawl web loading now uses the v2 API directly with proper retry logic, exponential backoff on rate limits, and configurable timeout handling, improving reliability for both cloud and self-hosted Firecrawl setups. #23934 ⏰ Calendar event reminder customization. Calendar events now support a configurable reminder_minutes parameter, allowing models to set custom reminder durations instead of the default 10-minute notifi...", "diff_excerpt": ["--- previous", "+++ current", "@@ -1,2 +1,8 @@", "+title=v0.9.2", "+updated=2026-04-24T09:56:14Z", "+link=https://github.com/open-webui/open-webui/releases/tag/v0.9.2", "+summary=", "+content=Added 🧠 PaddleOCR-vl document extraction. Administrators can now use PaddleOCR-vl as a content extraction engine for document processing, with configurable API URL and token settings in document retrieval configuration. #23945 🔥 Firecrawl v2 API. Firecrawl web loading now uses the v2 API directly with proper retry logic, exponential backoff on rate limits, and configurable timeout handling, improving reliability for both cloud and self-hosted Firecrawl setups. #23934 ⏰ Calendar event reminder customization. Calendar events now support a configurable reminder_minutes parameter, allowing models to set custom reminder durations instead of the default 10-minute notification. 🔑 Custom API key header. Administrators can now configure a custom header name for API key authentication via the CUSTOM_API_KEY_HEADER environment variable, enabling compatibility with reverse proxies that use the Authorization header for their own authentication. 🔌 OAuth session disconnection. Users can now disconnect OAuth sessions for specific providers (e.g., MCP connections) through a new API endpoint, enabling cleaner re-authentication workflows. 📚 Source overflow indicator. The Sources button now shows a +N badge when more than three sources are available, so hidden sources are clearly indicated in chat responses. #23918 ⚡ Model list performance. Model list API responses now strip base64 profile image data from paginated results, and model tags are fetched via a dedicated efficient query instead of loading all models. This significantly reduces payload sizes and improves workspace Models page responsiveness. ⚡ Model avatar cache reuse. Default model profile images now redirect to a shared static path instead of reading files from disk per-request, reducing repeated I/O and improving loading efficiency when multiple models use the fallback icon. #24015 🚀 Faster splash image loading. Splash screen images are now prioritized earlier during page load with preload links, improving first-load LCP behavior and reducing delayed image discovery. #24011 🧵 Streaming markdown performance stability. Streaming responses now stay more memory-efficient by preventing repeated cleanup callback registration during markdown updates. #24048 📊 Telemetry gauge reliability. OpenTelemetry user gauge callbacks now use synchronous database queries directly, eliminating cross-thread async bridging issues that could cause silent failures in metric collection. 🔄 General improvements. Various improvements were implemented across the application to enhance performance, stability, and security. 🌐 Translation updates. Translations for Finnish, Korean, Portuguese (Brazil), and Dutch were enhanced and expanded. Fixed 🔧 MCP task cancellation stability. Interrupted MCP tool calls no longer cause CPU spikes or runaway cleanup behavior. MCP client disconnection now runs in the same asyncio task as connection, respecting cancel scope constraints, and chat-active events are properly shielded during cancellation. 🧠 Persistent chat skill injection. Skills mentioned in persisted chats now inject into the system prompt reliably. Skill ID extraction from &lt;$skillId|label&gt; message tags is now handled server-side, and tags are stripped before messages reach the model. 🗄️ Async database driver migration. The async database backend now uses psycopg (v3) instead of asyncpg, eliminating brittle SSL parameter translation and supporting native libpq connection strings including sslmode , options , and target_session_attrs without any stripping or conversion. 🐳 Docker ARM64 reliability. Docker images built for arm64 via QEMU cross-compilation no longer produce 0-byte corrupted Python dependencies. UV_LINK_MODE=copy is now set in the Dockerfile to force reliable file installation. 🛠️ Throttle request handling. Request handling no longer fails when user activity status updates are throttled with a non-zero interval. #23979 ✍️ Rich text extension conflicts. Rich text editing no longer triggers duplicate extension conflicts for lists and code blocks, improving editor stability. #24009 🔇 Fetch URL null content guard. The fetch_url built-in tool now safely handles None content returned by web loaders instead of crashing with a TypeError . 🌐 OAuth discovery fallback. OAuth protected resource discovery now falls back to well-known RFC 9728 URIs when the WWW-Authenticate header doesn't contain a resource_metadata link, improving compatibility with more MCP server implementations. 🔐 Session token resolution. Session user endpoints now gracefully handle missing Authorization headers by falling back to cookie and request state tokens, preventing errors when used behind forward-auth proxies. 🚫 Direct API error responses. Chat completion requests without a WebSocket channel (direct API calls) now return proper HTTP error responses instead of silently returning null on failure. 📡 Cancelled response stream cleanup. Cancelled chat generation now explicitly closes the upstream response body iterator, preventing orphaned async generators from spinning in anyio internals. 🔒 Model profile image path safety. Model profile image endpoints now validate and sanitize static asset redirect paths, preventing path traversal through encoded dots or malicious URL patterns. 📊 RAG template validation UI. The Documents settings page now displays a warning when RAG templates contain multiple [context] or {{CONTEXT}} placeholders, helping administrators avoid accidental redundant context injection. 🧩 Automation model detection. The create_automation tool now correctly detects the current model ID even when model_id is not yet set in metadata, falling back to the model dict. 🔄 MCP resource content handling. MCP tool results with the resource content type are now correctly detected and their resource.text payload is extracted, instead of being silently ignored. 🔄 Ollama and OpenAI metadata forwarding. Ollama and OpenAI proxy routes now forward request metadata to downstream handlers, ensuring consistent context propagation. 🧹 Browser-native message virtualization. The custom JavaScript-based message culling system (spacers, height caching, scroll listeners) was replaced with CSS content-visibility: auto , letting the browser natively skip rendering of off-screen messages without destroying component trees. This eliminates scroll jump artifacts and mount/destroy thrashing while preserving memory efficiency in long conversations. 📻 Redis notification compatibility. Redis pub/sub now handles missing or incompatible client_name support more gracefully, preventing connection errors with certain Redis configurations. Changed ⚙️ psycopg v3 async driver. The async database driver has been migrated from asyncpg to psycopg (v3). This is a transparent change for most deployments, but custom connection strings with asyncpg -specific parameters may need adjustment. 🔑 Brotli dependency update. Brotli has been updated to address CVE-2025-6176 . 🖥️ Windows startup script. The Windows startup batch script has been updated for improved compatibility.", "+", " title=v0.9.1", " updated=2026-04-21T10:45:37Z", "@@ -52,8 +58,2 @@", " summary=", " content=[0.8.6] - 2026-03-01 Added 🖥️ Open Terminal integration. Users can now connect to Open Terminal instances to browse, read, and upload files directly in chat, with the terminal acting as an always-on tool. File navigation includes folder browsing, image and PDF previews, drag-and-drop uploads, directory creation, and file deletion. The current working directory is automatically injected into tool descriptions for context-aware commands. Commit , Commit , Commit 📄 Terminal file creation. Users can now create new empty files directly in the Open Terminal file browser, in addition to the existing folder creation functionality. Commit ✏️ Terminal file editing. Users can now edit text files directly in the Open Terminal file browser, with the ability to save changes back to the terminal. Commit 🛠️ Terminal file preview toolbar. The Open Terminal file browser now displays contextual toolbar buttons based on file type, including preview/source toggle for Markdown and CSV files, reset view for images, and improved editing controls for text files. Commit 🔄 Terminal file write refresh. The file browser now automatically refreshes when files are written or modified via the write_file or replace_file_content tools, eliminating the need to manually refresh. Commit 🛡️ Docker image SBOM attestation. Docker images now include a Software Bill of Materials (SBOM) for vulnerability scanning and supply chain security compliance. #21779 , Commit 📡 Reporting-Endpoints security header. Administrators can now configure a Reporting-Endpoints header via the REPORTING_ENDPOINTS environment variable to receive CSP violation reports directly, aiding in security policy debugging and hardening. #21830 🎯 Action button priority sorting. Action buttons under assistant messages now appear in a consistent order based on the priority field from function Valves, allowing developers to control button placement. #21790 🏷️ Public/Private model filtering. The Admin Settings Model listing now displays Public/Private badges and includes filter options to easily view public or private models. #21732 , #21797 👁️ Show/Hide all models bulk action. Administrators can now show or hide all models at once from the Admin Settings Models page Actions menu, making it faster to manage model visibility. Bulk actions now display a single toast notification on success for better user feedback. #21838 , #21958 🔐 Individual user sharing control. Administrators can now disable individual user sharing via the USER_PERMISSIONS_ACCESS_GRANTS_ALLOW_USERS environment variable, allowing only group-based sharing when set to false. #21793 , Commit , Commit 🔄 OAuth profile sync on login. Administrators can now enable automatic synchronization of user profile name and email from OAuth providers on login via the OAUTH_UPDATE_NAME_ON_LOGIN and OAUTH_UPDATE_EMAIL_ON_LOGIN environment variables. #21787 , Commit 👥 Default group share permission. Administrators can now configure the default sharing permission for new groups via the DEFAULT_GROUP_SHARE_PERMISSION environment variable, controlling whether anyone, no one, or only members can share to new groups. Commit 💨 Streaming performance. Chat responses now render more efficiently during streaming, reducing CPU usage and improving responsiveness. Commit 🧮 Streaming message comparison. Chat message updates during streaming are now faster thanks to an optimization that skips expensive comparisons when content changes. #21884 🚀 Streaming scroll optimization. Chat auto-scroll during streaming is now more efficient by batching scroll operations via requestAnimationFrame, reducing unnecessary layout reflows when tokens arrive faster than the browser can paint. #21946 📋 Message cloning performance. Chat message cloning during streaming is now more efficient thanks to the use of structuredClone() instead of JSON.parse(JSON.stringify(...)). #21948 🎯 Faster code block rendering. Chat message updates during streaming are now faster. #22101 📊 Faster status history display. Chat message updates during streaming are now faster. #22103 🛠️ Faster tool result handling. Tool execution results are now handled more efficiently, improving streaming performance. #22104 💾 Faster model and file operations. Model selection, file preparation, and history saving are now faster. #22102 🛠️ Tool server advanced options toggle. Advanced OpenAPI configuration options in the tool server modal are now hidden by default behind a toggle, simplifying the interface for basic setups. The admin settings tab was also renamed from \"Tools\" to \"Integrations\" for clearer organization. Commit , Commit 🔧 Faster tool loading. Tool access control now skips an unnecessary database query when no tools are attached to the request, slightly improving performance. #21873 ➗ Faster math rendering. Mathematical notation now renders more efficiently, improving responsiveness when displaying equations in chat. #21880 🏎️ Faster message list updates. The chat message list now rebuilds at most once per animation frame during streaming, reducing CPU overhead. #21885 📋 Faster message rendering. Chat message rendering is now more efficient during streaming. #22086 🗄️ Faster real-time chat updates. Chat responses now process faster with improved handling for concurrent users. #22087 📝 Faster status persistence. Only final status updates are now saved to the database during streaming, reducing unnecessary writes. #22085 🔄 Faster event matching. Event handling in the socket handler is now more efficient. Commit 🔀 General improvements. Various improvements were implemented across the application to enhance performance, stability, and security. 🌐 Translation updates. Translations for German, Portuguese (Brazil), Simplified Chinese, Traditional Chinese, Catalan, and Spanish were enhanced and expanded. Fixed 🗄️ Database migration execution. Database migrations now run correctly on startup, fixing a circular import issue that caused schema updates to fail silently. #21848 , Commit 🔔 Notification HTML escaping. Notification messages now properly escape HTML content, matching the behavior in chat messages and ensuring consistent rendering across the interface. #21860 , Commit 🛠️ Tool call JSON error handling. Chat no longer crashes when models generate malformed JSON in tool call arguments; instead, a descriptive error message is returned to the model for retry. #21984 , Commit 🧠 Reasoning model KV cache preservation. Reasoning model thinking tags are no longer stored as HTML in the database, preserving KV cache efficiency for backends like llama.cpp and ensuring faster subsequent conversation turns. #21815 , Commit ⚡ Duplicate model execution prevention. Models are no longer called twice when no tools are configured, eliminating unnecessary API requests and reducing latency. #21802 , Commit 🔐 OAuth session database error. OAuth login no longer fails with a database error when creating sessions, fixing the \"'NoneType' object has no attribute 'id'\" and \"can't adapt type 'dict'\" errors that occurred during OAuth group creation. #21788 👤 User sharing permission enforcement. The user sharing option now correctly respects the USER_PERMISSIONS_ACCESS_GRANTS_ALLOW_USERS setting, fixing an issue where sharing to individual users was incorrectly allowed even when disabled. #21856 , Commit , Commit 🔑 Password manager autofill. Password manager autofill (like iCloud Passwords, 1Password, Bitwarden) now correctly captures filled-in passwords, fixing login failures where the password appeared filled but was sent as empty. #21869 , Commit 📝 RAG template duplication. RAG templates are no longer duplicated in chat messages when models make multiple tool calls, preventing hallucinations and incorrect tool usage. #21780 , Commit 📋 Audit log stdout. Audit logs now correctly appear on stdout when the ENABLE_AUDIT_STDOUT environment variable is set to true, aligning runtime behavior with the intended configuration. #21777 🎯 Function valve priority resolution. Function priorities defined in code are now correctly applied when no custom value has been saved in the database, ensuring consistent action button and filter ordering. #21841 📄 Web content knowledge base append. Processing web URLs with overwrite=false now correctly appends content to existing knowledge bases instead of silently doing nothing, fixing a regression where no content was being added. #21786 , Commit 🔍 Web search domain filter config. The WEB_SEARCH_DOMAIN_FILTER_LIST environment variable is now correctly read and applied, fixing an issue where domain filtering for web searches always used an empty default value. #21964 , #20186 🧹 Tooltip memory leak. Tooltip instances are now properly destroyed when elements change, fixing a memory leak that could cause performance issues over time. #21969 ⌨️ MessageInput memory leak. Event listeners in the message input component are now properly cleaned up, preventing a memory leak that could cause page crashes during extended use. #21968 📝 Notes memory leak. Event listeners in the Notes component are now properly cleaned up, fixing a memory leak that could cause page crashes during extended use. #21963 🏗️ Model create memory leak. Event listeners in the model creation page are now properly cleaned up, fixing a memory leak that could cause page crashes during extended use. #21966 💬 MentionList memory leak. Event listeners in the MentionList component are now properly cleaned up, fixing a memory leak that could cause page crashes during extended use. #21965 📐 Sidebar memory leak. Event listeners in the Sidebar component are now properly cleaned up, fixing a memory leak that could cause page crashes during extended use. #22082 🎨 Sidebar user menu positioning. The sidebar user menu no longer drifts rightward when the sidebar is resized, keeping the menu properly aligned with its trigger. #21853 💻 Code block UI. Code block headers are now sticky and properly positioned, with language labels now showing tooltips for truncated text. Commit 📊 Multi-model responses horizontal scroll. The model list in multi-model responses tabs now has horizontal scroll support, making all models accessible on desktop screens. #21800 , Commit 🎭 TailwindCSS gray color theme. Custom gray color palette is now correctly applied to the CSS root theme layer, fixing an issue where --color-gray-x variables were missing. #21900 , #21899 📎 Broken documentation links. Fixed broken links in the backend config and admin settings that pointed to outdated documentation locations. #21904 🔓 OAuth session token decryption. OAuth sessions are now properly detached from the database context before token decryption, preventing potential database session conflicts when reading encrypted tokens. #21794 🕐 Chat timestamp i18n fix. Chat timestamps in the sidebar now display correctly, fixing an issue where the time ago format (e.g., \"5m\", \"2h\", \"3d\") was not being localized properly due to incorrect variable casing in the translation function. Commit 🍞 Model toast notification fix. Hiding or showing a single model now displays only one toast notification instead of two, removing the redundant generic \"model updated\" message when a specific action toast is shown. #22079 📡 Offline mode embedding model fix. Open WebUI no longer attempts to download embedding models when in offline mode, fixing error logs that occurred when trying to fetch models that weren't cached locally. #22106 , #21405", "-", "-title=v0.8.5", "-updated=2026-02-23T09:26:34Z", "-link=https://github.com/open-webui/open-webui/releases/tag/v0.8.5", "-summary=", "-content=[0.8.5] - 2026-02-23 Added ⌨️ Voice dictation shortcut. Users can now toggle voice dictation using Cmd+Shift+L (or Ctrl+Shift+L on Windows/Linux), making it faster to start and stop dictation without clicking the microphone button. Fixed 🚫 Model access KeyError fix. The /api/models endpoint no longer crashes with a 500 error when models have incomplete info metadata missing the user_id field (e.g. models using global default metadata). 🔄 Frontend initialization resilience. The app layout now gracefully handles individual API failures during initialization (getModels, getBanners, getTools, getUserSettings, setToolServers) instead of blocking the entire page load when any single call fails. 🛡️ Backend config null safety. Language detection during app initialization no longer crashes when the backend config fetch fails, preventing a secondary cause of infinite loading."], "article_identity": "v092", "is_page_error": false, "status": "auto-published-demo", "merge_key": "release||github open webui releases||https://github.com/open-webui/open-webui/releases/tag/v0.9.2", "id": "evt-fd03c756eb2bc57f97f9", "content_fingerprint": "title v0 9 2 updated 2026 04 24t09 56 14z link https github com open webui open webui releases tag v0 9 2 summary content added paddleocr vl document extraction administrators can now use paddleocr vl as a content extraction engine for document processing with configurable api url and token settings in document retrieval configuration 23945 firecrawl v2 api firecrawl web loading now uses the v2 api directly with proper retry logic exponential backoff on rate limits and configurable timeout handling improving reliability for both cloud and self hosted firecrawl setups 2 laude, GPT, or any other LLM. Check out the docs or view the source ​ OpenHands Local GUI Use the Local GUI for running agents on your laptop. It comes with a REST API and a single-page React application. The experience will be familiar to anyone who has used Devin or Jules. Check out the docs or view the source in this repo. ​ OpenHands Cloud This is a commercial deployment of OpenHands GUI, running on hosted infrastructure. You can try it with a free by signing in with your GitHub account . OpenHands Cloud comes with source-available features and integrations: Deeper integrations with GitHub, GitLab, and Bitbucket Integrations with Slack, Jira, and Linear Multi-user support RBAC and permissions Collaboration features (e.g., conversation sharing) Usage reporting Budgeting enforcement ​ OpenHands Enterprise Large enterprises can work with us to self-host OpenHands Cloud in their own VPC, via Kubernetes. OpenHands Enterprise can also work with the CLI and SDK above. OpenHands Enterprise is source-available—you can see all the source code here in the enterprise/ directory, but you’ll need to purchase a license if you want to run it for more than one month. Enterprise contracts also come with extended support and access to our research team. Learn more at openhands.dev/enterprise ​ Everything Else Check out our Product Roadmap , and feel free to open up an issue if there’s something you’d like to see! You might also be interested in our evaluation infrastructure , our chrome extension , or our Theory-of-Mind module . All our work is available under the MIT license, except for the enterprise/ directory in this repository (see the enterprise license for details). The core openhands and agent-server Docker images are fully MIT-licensed as well. If you need help with anything, or just want to chat, come find us on Slack . Was this page helpful? Yes No Quick Start ⌘ I OpenHands Docs home page slack github Company Blog Cloud Enterprise slack github Powered by This documentat  1 月，SiliconFlow 平台上线基于华为云昇腾云服务的 DeepSeek-V3、DeepSeek-R1 推理服务。通过双方联合创新，在硅基流动自研推理加速引擎加持下，平台上的 DeepSeek 模型可获得持平全球高端 GPU 部署模型的效果。 提供高效能大模型推理加速服务，提升 GenAI 应用的用户体验。 提供模型微调与部署的托管服务，用户可直接托管经过微调的大语言模型，在支撑业务迭代的同时，无需关注底层资源、服务质量，有效降低维护成本。 ​ 3. 产品特性 高速推理 自研高效算子和优化框架，推理加速引擎全球领先。 极致提升吞吐能力，全面支持高吞吐场景的业务需求。 显著优化计算延迟，为低延迟场景提供卓越性能保障。 高扩展性 动态扩容支持弹性业务模型，无缝适配多种复杂场景。 一键部署自定义模型，轻松应对规模化挑战。 灵活架构设计，满足多样化任务需求，支持混合云部署。 高性价比 端到端极致优化，推理和部署成本显著降低。 提供灵活按需付费模式，减少资源浪费，精准控制预算。 支持国产异构 GPU 部署，基于企业已有投资，节省企业投入。 高稳定性 经过开发者验证，保证高可靠稳定运行。 提供完善的监控和容错机制，保障服务能力。 提供专业技术支持，满足企业级场景需求，确保服务高可用性。 高智能 提供多种先进模型服务，包括大语言模型、音视频等多模态模型。 智能扩展功能，灵活适配业务规模，满足多种服务需求。 智能成本分析，为业务优化提供支持，助力成本管控与效益提升。 高安全性 支持 BYOC 部署，全面保护数据隐私与业务安全。 计算隔离/网络隔离/存储隔离，保障数据安全。 符合行业标准与合规要求，全面满足企业级用户的安全需求。 快速上手 ⌘ I Powered by This documentation is built and hosted on Mintlify, a developer documentation platform update detected", "summary_en": "Skip to main content SiliconFlow home page 简体中文 Search... ⌘ K Search... Navigation 开始使用 产品简介 用户指南 场景示例 API手册 更新公告 条款与协议 开始使用 产品简介 快速上手 在编程工具中使用本文档 功能特性 流式输出 语言模型 多模态模型（视觉/音频/视频） 视频生成模型 生图模型 文本转语音模型 推理模型 JSON 模式 前缀续写 FIM 补全 Function Calling 模型微调 批量...", "headline_zh": "", "summary_zh": "", "evidence_excerpt": "Skip to main content SiliconFlow home page 简体中文 Search... ⌘ K Search... Navigation 开始使用 产品简介 用户指南 场景示例 API手册 更新公告 条款与协议 开始使用 产品简介 快速上手 在编程工具中使用本文档 功能特性 流式输出 语言模型 多模态模型（视觉/音频/视频） 视频生成模型 生图模型 文本转语音模型 推理模型 JSON 模式 前缀续写 FIM 补全 Function Calling 模型微调 批量推理 常见问题 实名认证 开具发票 错误处理 模型问题 使用问题 财务问题 上架指南 Rate Limits 硅基流动产品集 SiliconFlow 平台 OneDiff 多模态推理加速引擎 企业级 MaaS 平台 On this page 1. 产品介绍 2. 产品功能 3. 产品特性 开始使用 产品简介 ​ 1. 产品介绍 作为集合顶尖大模型的一站式云服务平台， SiliconFlow 致力于为开发者提供更快、更全面、体验更丝滑的模型 API，助力开发者和企业聚焦产品创新，无须担心产品大规模推广所带来的高昂算力成本。 ​ 2. 产品功能 提供开箱即用的大模型 API，按量收费，助力应用开发轻松实现。 已上架包括 Qwen2.5-72B、DeepSeek-V2.5、Qwen2、InternLM2.5-20B-Chat、BCE、BGE、SenseVoice-Small、DeepSeek-Coder-V2、SD3 Medium、GLM-4-9B-Chat、InstantID 在内的多种开源大语言模型、图片生成模型、代码生成模型、向量与重排序模型以及多模态大模型，覆盖语言、语音、图片、视频等多场景。 其中，Qwen2.5（7B）等多个大模型 API 免费使用，让开发者与产品经理无需担心研...", "article_identity": "si   <script>
    const archive = JSON.parse(document.getElementById('archive-data').textContent);
    const articleMapping = JSON.parse(document.getElementById('article-mapping').textContent);
    const perPage = 50;
    let page = 1;
    let categoryFilter = '';
    let sourceFilter = '';
    const listNode = document.getElementById('history-list');
    const pageState = document.getElementById('page-state');
    const prevButton = document.getElementById('prev-page');
    const nextButton = document.getElementById('next-page');
    const categorySelect = document.getElementById('category-filter');
    const sourceSelect = document.getElementById('source-filter');

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('en-US', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).format(date) + ' Taipei';
    }

    function uniqueValues(key) {
      return [...new Set(archive.map((item) => item[key]).filter(Boolean))].sort();
    }
    function fillSelect(select, values) {
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }
    fillSelect(categorySelect, uniqueValues('category'));
    fillSelect(sourceSelect, uniqueValues('source_name'));

    function filteredItems() {
      return archive.filter((item) => {
        if (categoryFilter && item.category !== categoryFilter) return false;
        if (sourceFilter && item.source_name !== sourceFilter) return false;
        return true;
      });
    }

    function render() {
      const items = filteredItems();
      const totalPages = Math.max(1, Math.ceil(items.length / perPage));
      page = Math.min(page, totalPages);
      const slice = items.slice((page - 1) * perPage, page * perPage);
      listNode.innerHTML = '';
      slice.forEach((item) => {
        // Look up standalone article page via stable keys
        let articleSlug = null;
        for (const key of ['article_identity', 'merge_key', 'id']) {
          const k = item[key];
          if (k && articleMapping[k]) {
            articleSlug = articleMapping[k];
            break;
          }
        }
        const articleUrl = articleSlug ? './articles/' + articleSlug + '.html' : null;
        const headline = articleUrl
          ? '<a href="' + articleUrl + '">' + item.headline_en + '</a>'
          : item.headline_en;
        const article = document.createElement('article');
        article.className = 'card';
        article.innerHTML = `
          <div class="row"><span class="pill">${item.category}</span><time>${formatTime(item.timestamp)}</time></div>
          <h2>${headline}</h2>
          <p>${item.summary_en}</p>
          <div class="row"><span>${item.source_name}</span><a href="${item.target_url || item.source_url || '#'}">Source</a></div>
        `;
        listNode.appendChild(article);
      });
      pageState.textContent = `Page ${page} / ${totalPages} - ${items.length} items`;
      prevButton.disabled = page <= 1;
      nextButton.disabled = page >= totalPages;
    }

    categorySelect.addEventListener('change', (event) => { categoryFilter = event.target.value; page = 1; render(); });
    sourceSelect.addEventListener('change', (event) => { sourceFilter = event.target.value; page = 1; render(); });
    prevButton.addEventListener('click', () => { page = Math.max(1, page - 1); render(); });
    nextButton.addEventListener('click', () => { page = page + 1; render(); });
    render();
  </script>
