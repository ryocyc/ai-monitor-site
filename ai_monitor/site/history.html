 by each MCP server Web Search $5 / 1k calls Search the internet and browse web pages web_search X Search $5 / 1k calls Search X posts, user profiles, and threads x_search Code Execution $5 / 1k calls Run Python code in a sandboxed environment code_execution code_interpreter File Attachments $10 / 1k calls Search through files attached to messages attachment_search Collections Search $2.50 / 1k calls Query your uploaded document collections (RAG) collections_search file_search Image Understanding Token-based Analyze images found during Web Search and X Search* view_image X Video Understanding Token-based Analyze videos found during X Search* view_x_video Remote MCP Tools Token-based Connect and use custom MCP tool servers Tool name is set by each MCP server All tool names work in the Responses API. In the gRPC API (Python xAI SDK), code_interpreter and file_search are not supported. * Only applies to images and videos found by search tools — not to images passed directly in messages. For the view image and view x video tools, you will not be charged for the tool invocation itself but will be charged for the image tokens used to process the image or video. For Remote MCP tools, you will not be charged for the tool invocation but will be charged for any tokens used. For more information on using Tools, please visit our guide on Tools . Batch API Pricing The Batch API lets you process large volumes of requests asynchronously at 50% of standard pricing — effectively cutting your token costs in half. Batch requests are queued and processed in the background, with most completing within 24 hours. Real-time API Batch API Token pricing Standard rates 50% off standard rates Response time Immediate (seconds) Typically within 24 hours Rate limits Per-minute limits apply Requests don&#x27;t count towards rate limits The 50% discount applies to all token types — input tokens, output tokens, cached tokens, and reasoning tokens. To see batch pricing for a specific model, visit the  of the same model. In general: &lt;modelname&gt; is aliased to the latest stable version. &lt;modelname&gt;-latest is aliased to the latest version. This is suitable for users who want to access the latest features. &lt;modelname&gt;-&lt;date&gt; refers directly to a specific model release. This will not be updated and is for workflows that demand consistency. For most users, the aliased &lt;modelname&gt; or &lt;modelname&gt;-latest are recommended, as you would receive the latest features automatically. Billing and Availability Your model access might vary depending on various factors such as geographical location, account limitations, etc. For how the bills are charged , visit Manage Billing for more information. For the most up-to-date information on your team&#x27;s model availability , visit Models Page on xAI Console. Model Input and Output Each model can have one or multiple input and output capabilities. The input capabilities refer to which type(s) of prompt can the model accept in the request message body. The output capabilities refer to which type(s) of completion will the model generate in the response message body. This is a prompt example for models with text input capability: JSON [ { \"role\" : \"system\" , \"content\" : \"You are Grok, a chatbot inspired by the Hitchhiker's Guide to the Galaxy.\" }, { \"role\" : \"user\" , \"content\" : \"What is the meaning of life, the universe, and everything?\" } ] This is a prompt example for models with text and image input capabilities: JSON [ { \"role\" : \"user\" , \"content\" : [ { \"type\" : \"image_url\" , \"image_url\" : { \"url\" : \"data:image/jpeg;base64,&#x3C;base64_image_string>\" , \"detail\" : \"high\" } }, { \"type\" : \"text\" , \"text\" : \"Describe what's in this image.\" } ] } ] This is a prompt example for models with text input and image output capabilities: JSON // The entire request body { \"model\" : \"grok-4\" , \"prompt\" : \"A cat in a tree\" , \"n\" : 4 } Context Window The contex     const articleMapping = JSON.parse(document.getElementById('article-mapping').textContent);
    const perPage = 50;
    let page = 1;
    let categoryFilter = '';
    let sourceFilter = '';
    const listNode = document.getElementById('history-list');
    const pageState = document.getElementById('page-state');
    const prevButton = document.getElementById('prev-page');
    const nextButton = document.getElementById('next-page');
    const categorySelect = document.getElementById('category-filter');
    const sourceSelect = document.getElementById('source-filter');

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('en-US', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).format(date) + ' Taipei';
    }

    function uniqueValues(key) {
      return [...new Set(archive.map((item) => item[key]).filter(Boolean))].sort();
    }
    function fillSelect(select, values) {
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }
    fillSelect(categorySelect, uniqueValues('category'));
    fillSelect(sourceSelect, uniqueValues('source_name'));

    function filteredItems() {
      return archive.filter((item) => {
        if (categoryFilter && item.category !== categoryFilter) return false;
        if (sourceFilter && item.source_name !== sourceFilter) return false;
        return true;
      });
    }

    function render() {
      const items = filteredItems();
      const totalPages = Math.max(1, Math.ceil(items.length / perPage));
      page = Math.min(page, totalPages);
      const slice = items.slice((page - 1) * perPage, page * perPage);
      listNode.innerHTML = '';
      slice.forEach((item) => {
        // Look up standalone article page via stable keys
        let articleSlug = null;
        for (const key of ['article_identity', 'merge_key', 'id']) {
          const k = item[key];
          if (k && articleMapping[k]) {
            articleSlug = articleMapping[k];
            break;
          }
        }
        const articleUrl = articleSlug ? './articles/' + articleSlug + '.html' : null;
        const headline = articleUrl
          ? '<a href="' + articleUrl + '">' + item.headline_en + '</a>'
          : item.headline_en;
        const article = document.createElement('article');
        article.className = 'card';
        article.innerHTML = `
          <div class="row"><span class="pill">${item.category}</span><time>${formatTime(item.timestamp)}</time></div>
          <h2>${headline}</h2>
          <p>${item.summary_en}</p>
          <div class="row"><span>${item.source_name}</span><a href="${item.target_url || item.source_url || '#'}">Source</a></div>
        `;
        listNode.appendChild(article);
      });
      pageState.textContent = `Page ${page} / ${totalPages} - ${items.length} items`;
      prevButton.disabled = page <= 1;
      nextButton.disabled = page >= totalPages;
    }

    categorySelect.addEventListener('change', (event) => { categoryFilter = event.target.value; page = 1; render(); });
    sourceSelect.addEventListener('change', (event) => { sourceFilter = event.target.value; page = 1; render(); });
    prevButton.addEventListener('click', () => { page = Math.max(1, page - 1); render(); });
    nextButton.addEventListener('click', () => { page = page + 1; render(); });
    render();
  </script>
</body>
</html>
