ning realism, creative designs, and consistent styles $0.09 / output image recraft-ai / recraft-v3 Recraft V3 (code-named red_panda) is a text-to-image model with the ability to generate long texts, and images in a wide list of styles. As of today, it is SOTA in image generation, proven by the Text-to-Image Benchmark by Artificial Analysis $0.04 / output image wavespeedai / wan-2.1-i2v-480p Accelerated inference for Wan 2.1 14B image to video, a comprehensive and open suite of video foundation models that pushes the boundaries of video generation. $0.09 / second of output video wavespeedai / wan-2.1-i2v-720p Accelerated inference for Wan 2.1 14B image to video with high resolution, a comprehensive and open suite of video foundation models that pushes the boundaries of video generation. $0.25 / second of output video Private models You aren&#x27;t limited to the public models on Replicate: you can deploy your own custom models using Cog , our open-source tool for packaging machine learning models. Unlike public models, most private models (with the exception of fast booting fine-tunes ) run on dedicated hardware so you don&#x27;t have to share a queue with anyone else. This means you pay for all the time instances of the model are online: the time they spend setting up; the time they spend idle, waiting for requests; and the time they spend active, processing your requests. If you get a ton of traffic, we automatically scale up and down to handle the demand. For fast booting fine-tunes you&#x27;ll only be billed for the time the model is active and processing your requests, so you won&#x27;t pay for idle time like with other private models. Fast booting fine-tunes are labeled as such in the model&#x27;s version list. Hardware pricing CPU (Small) cpu-small $ 0.000025 /sec $ 0.09 /hr GPU - CPU 1x GPU RAM - RAM 2GB CPU cpu $ 0.000100 /sec $ 0.36 /hr GPU - CPU 4x GPU RAM - RAM 8GB Nvidia A100 (80GB) GPU gpu-a100-large $ 0.001400 /sec $ 5.04 /hr GPU 1x CPU 10x GPU RAM 80G d-demo", "merge_key": "release||github codex releases||https://github.com/openai/codex/releases/tag/rust-v0.125.0-alpha.1", "id": "evt-8dd610c1aea3ae6dc54d", "content_fingerprint": "title rust v0 125 0 alpha 1 updated 2026 04 24t10 16 07z link https github com openai codex releases tag rust v0 125 0 alpha 1 summary content release 0 125 0 alpha 1 codex release feed now shows rust v0 125 0 alpha 1 the monitored release feed for codex changed and the newest visible tag is rust v0 125 0 alpha 1 the feed timestamp is 2026 04 24t10 16 07z this looks like a release level update rather than a cosmetic page edit", "needs_cc_refresh": false, "article_h1": "OpenAI Ships Codex Rust Release 0.125.0-alpha.1", "article_standfirst": "OpenAI has published a new pre-release version of its Codex coding assistant, tagged rust-v0.125.0-alpha.1, updated on 24 April 2026.", "article_confidence": "moderate", "article_generation_mode": "claude"}, {"timestamp": "2026-04-24T09:56:18+00:00", "source_name": "GitHub Open WebUI Releases", "source_url": "https://github.com/open-webui/open-webui/releases.atom", "effective_url": "https://github.com/open-webui/open-webui/releases.atom", "target_url": "https://github.com/open-webui/open-webui/releases/tag/v0.9.2", "category": "release", "headline_en": "Open WebUI v0.9.2 Brings OCR Document Extraction, Firecrawl v2 API, and Custom Calendar Reminders", "summary_en": "Open WebUI has released version v0.9.2, adding PaddleOCR-vl for document processing, upgrading to the Firecrawl v2 API with robust retry logic, and introducing configurable calendar event reminder settings.", "headline_zh": "", "summary_zh": "", "evidence_excerpt": "title=v0.9.2 updated=2026-04-24T09:56:14Z link=https://github.com/open-webui/open-webui/releases/tag/v0.9.2 summary= content=Added 🧠 PaddleOCR-vl document extraction. Administrators can now use PaddleOCR-vl as a content extraction engine for document processing, with configurable API URL and token settings in document retrieval configuration. #23945 🔥 Firecrawl v2 API. Firecrawl web loading now uses the v2 API directly with proper retry logic, exponential backoff on rate limits, and configurable timeout handling, improving reliability for both cloud and self-hosted Firecrawl setups. #23934 ⏰ Calendar event reminder customization. Calendar events now support a configurable reminder_minutes parameter, allowing models to set custom reminder durations instead of the default 10-minute notifi...", "diff_excerpt": ["--- previous", "+++ current", "@@ -1,2 +1,8 @@", "+title=v0.9.2", "+updated=2026-04-24T09:56:14Z", "+link=https://github.com/open-webui/open-webui/releases/tag/v0.9.2", "+summary=", "+content=Added 🧠 PaddleOCR-vl document extraction. Administrators can now use PaddleOCR-vl as a content extraction engine for document processing, with configurable API URL and token settings in document retrieval configuration. #23945 🔥 Firecrawl v2 API. Firecrawl web loading now uses the v2 API directly with proper retry logic, exponential backoff on rate limits, and configurable timeout handling, improving reliability for both cloud and self-hosted Firecrawl setups. #23934 ⏰ Calendar event reminder customization. Calendar events now support a configurable reminder_minutes parameter, allowing models to set custom reminder durations instead of the default 10-minute notification. 🔑 Custom API key header. Administrators can now configure a custom header name for API key authentication via the CUSTOM_API_KEY_HEADER environment variable, enabling compatibility with reverse proxies that use the Authorization header for their own authentication. 🔌 OAuth session disconnection. Users can now disconnect OAuth sessions for specific providers (e.g., MCP connections) through a new API endpoint, enabling cleaner re-authentication workflows. 📚 Source overflow indicator. The Sources button now shows a +N badge when more than three sources are available, so hidden sources are clearly indicated in chat responses. #23918 ⚡ Model list performance. Model list API responses now strip base64 profile image data from paginated results, and model tags are fetched via a dedicated efficient query instead of loading all models. This significantly reduces payload sizes and improves workspace Models page responsiveness. ⚡ Model avatar cache reuse. Default model profile images now redirect to a shared static path instead of reading files from disk per-request, reducing repeated I/O and improving loading efficiency when multiple models use the fallback icon. #24015 🚀 Faster splash image loading. Splash screen images are now prioritized earlier during page load with preload links, improving first-load LCP behavior and reducing delayed image discovery. #24011 🧵 Streaming markdown performance stability. Streaming responses now stay more memory-efficient by preventing repeated cleanup callback registration during markdown updates. #24048 📊 Telemetry gauge reliability. OpenTelemetry user gauge callbacks now use synchronous database queries directly, eliminating cross-thread async bridging issues that could cause silent failures in metric collection. 🔄 General improvements. Various improvements were implemented across the application to enhance performance, stability, and security. 🌐 Translation updates. Translations for Finnish, Korean, Portuguese (Brazil), and Dutch were enhanced and expanded. Fixed 🔧 MCP task cancellation stability. Interrupted MCP tool calls no longer cause CPU spikes or runaway cleanup behavior. MCP client disconnection now runs in the same asyncio task as connection, respecting cancel scope constraints, and chat-active events are properly shielded during cancellation. 🧠 Persistent chat skill injection. Skills mentioned in persisted chats now inject into the system prompt reliably. Skill ID extraction from &lt;$skillId|label&gt; message tags is now handled server-side, and tags are stripped before messages reach the model. 🗄️ Async database driver migration. The async database backend now uses psycopg (v3) instead of asyncpg, eliminating brittle SSL parameter translation and supporting native libpq connection strings including sslmode , options , and target_session_attrs without any stripping or conversion. 🐳 Docker ARM64 reliability. Docker images built for arm64 via QEMU cross-compilation no longer produce 0-byte corrupted Python dependencies. UV_LINK_MODE=copy is now set in the Dockerfile to force reliable file installation. 🛠️ Throttle request handling. Request handling no longer fails when user activity status updates are throttled with a non-zero interval. #23979 ✍️ Rich text extension conflicts. Rich text editing no longer triggers duplicate extension conflicts for lists and code blocks, improving editor stability. #24009 🔇 Fetch URL null content guard. The fetch_url built-in tool now safely handles None content returned by web loaders instead of crashing with a TypeError . 🌐 OAuth discovery fallback. OAuth protected resource discovery now falls back to well-known RFC 9728 URIs when the WWW-Authenticate header doesn't contain a resource_metadata link, improving compatibility with more MCP server implementations. 🔐 Session token resolution. Session user endpoints now gracefully handle missing Authorization headers by falling back to cookie and request state tokens, preventing errors when used behind forward-auth proxies. 🚫 Direct API error responses. Chat completion requests without a WebSocket channel (direct API calls) now return proper HTTP error responses instead of silently returning null on failure. 📡 Cancelled response stream cleanup. Cancelled chat generation now explicitly closes the upstream response body iterator, preventing orphaned async generators from spinning in anyio internals. 🔒 Model profile image path safety. Model profile image endpoints now validate and sanitize static asset redirect paths, preventing path traversal through encoded dots or malicious URL patterns. 📊 RAG template validation UI. The Documents settings page now displays a warning when RAG templates contain multiple [context] or {{CONTEXT}} placeholders, helping administrators avoid accidental redundant context injection. 🧩 Automation model detection. The create_automation tool now correctly detects the current model ID even when model_id is not yet set in metadata, falling back to the model dict. 🔄 MCP resource content handling. MCP tool results with the resource content type are now correctly detected and their resource.text payload is extracted, instead of being silently ignored. 🔄 Ollama and OpenAI metadata forwarding. Ollama and OpenAI proxy routes now forward request metadata to downstream handlers, ensuring consistent context propagation. 🧹 Browser-native message virtualization. The custom JavaScript-based message culling system (spacers, height caching, scroll listeners) was replaced with CSS content-visibility: auto , letting the browser natively skip rendering of off-screen messages without destroying component trees. This eliminates scroll jump artifacts and mount/destroy thrashing while preserving memory efficiency in long conversations. 📻 Redis notification compatibility. Redis pub/sub now handles missing or incompatible client_name support more gracefully, preventing connection errors with certain Redis configurations. Changed ⚙️ psycopg v3 async driver. The async database driver has been migrated from asyncpg to psycopg (v3). This is a transparent change for most deployments, but custom connection strings with asyncpg -specific parameters may need adjustment. 🔑 Brotli dependency update. Brotli has been updated to address CVE-2025-6176 . 🖥️ Windows startup script. The Windows startup batch script has been updated for improved compatibility.", "+", " title=v0.9.1", " updated=2026-04-21T10:45:37Z", "@@ -52,8 +58,2 @@", " summary=", " content=[0.8.6] - 2026-03-01 Added 🖥️ Open Terminal integration. Users can now connect to Open Terminal instances to browse, read, and upload files directly in chat, with the terminal acting as an always-on tool. File navigation includes folder browsing, image and PDF previews, drag-and-drop uploads, directory creation, and file deletion. The current working directory is automatically injected into tool descriptions for context-aware commands. Commit , Commit , Commit 📄 Terminal file creation. Users can now create new empty files directly in the Open Terminal file browser, in addition to the existing folder creation functionality. Commit ✏️ Terminal file editing. Users can now edit text files directly in the Open Terminal file browser, with the ability to save changes back to the terminal. Commit 🛠️ Terminal file preview toolbar. The Open Terminal file browser now displays contextual toolbar buttons based on file type, including preview/source toggle for Markdown and CSV files, reset view for images, and improved editing controls for text files. Commit 🔄 Terminal file write refresh. The file browser now automatically refreshes when files are written or modified via the write_file or replace_file_content tools, eliminating the need to manually refresh. Commit 🛡️ Docker image SBOM attestation. Docker images now include a Software Bill of Materials (SBOM) for vulnerability scanning and supply chain security compliance. #21779 , Commit 📡 Reporting-Endpoints security header. Administrators can now configure a Reporting-Endpoints header via the REPORTING_ENDPOINTS environment variable to receive CSP violation reports directly, aiding in security policy debugging and hardening. #21830 🎯 Action button priority sorting. Action buttons under assistant messages now appear in a consistent order based on the priority field from function Valves, allowing developers to control button placement. #21790 🏷️ Public/Private model filtering. The Admin Settings Model listing now displays Public/Private badges and includes filter options to easily view public or private models. #21732 , #21797 👁️ Show/Hide all models bulk action. Administrators can now show or hide all models at once from the Admin Settings Models page Actions menu, making it faster to manage model visibility. Bulk actions now display a single toast notification on success for better user feedback. #21838 , #21958 🔐 Individual user sharing control. Administrators can now disable individual user sharing via the USER_PERMISSIONS_ACCESS_GRANTS_ALLOW_USERS environment variable, allowing only group-based sharing when set to false. #21793 , Commit , Commit 🔄 OAuth profile sync on login. Administrators can now enable automatic synchronization of user profile name and email from OAuth providers on login via the OAUTH_UPDATE_NAME_ON_LOGIN and OAUTH_UPDATE_EMAIL_ON_LOGIN environment variables. #21787 , Commit 👥 Default group share permission. Administrators can now configure the default sharing permission for new groups via the DEFAULT_GROUP_SHARE_PERMISSION environment variable, controlling whether anyone, no one, or only members can share to new groups. Commit 💨 Streaming performance. Chat responses now render more efficiently during streaming, reducing CPU usage and improving responsiveness. Commit 🧮 Streaming message comparison. Chat message updates during streaming are now faster thanks to an optimization that skips expensive comparisons when content changes. #21884 🚀 Streaming scroll optimization. Chat auto-scroll during streaming is now more efficient by batching scroll operations via requestAnimationFrame, reducing unnecessary layout reflows when tokens arrive faster than the browser can paint. #21946 📋 Message cloning performance. Chat message cloning during streaming is now more efficient thanks to the use of structuredClone() instead of JSON.parse(JSON.stringify(...)). #21948 🎯 Faster code block rendering. Chat message updates during streaming are now faster. #22101 📊 Faster status history display. Chat message updates during streaming are now faster. #22103 🛠️ Faster tool result handling. Tool execution results are now handled more efficiently, improving streaming performance. #22104 💾 Faster model and file operations. Model selection, file preparation, and history saving are now faster. #22102 🛠️ Tool server advanced options toggle. Advanced OpenAPI configuration options in the tool server modal are now hidden by default behind a toggle, simplifying the interface for basic setups. The admin settings tab was also renamed from \"Tools\" to \"Integrations\" for clearer organization. Commit , Commit 🔧 Faster tool loading. Tool access control now skips an unnecessary database query when no tools are attached to the request, slightly improving performance. #21873 ➗ Faster math rendering. Mathematical notation now renders more efficiently, improving responsiveness when displaying equations in chat. #21880 🏎️ Faster message list updates. The chat message list now rebuilds at most once per animation frame during streaming, reducing CPU overhead. #21885 📋 Faster message rendering. Chat message rendering is now more efficient during streaming. #22086 🗄️ Faster real-time chat updates. Chat responses now process faster with improved handling for concurrent users. #22087 📝 Faster status persistence. Only final status updates are now saved to the database during streaming, reducing unnecessary writes. #22085 🔄 Faster event matching. Event handling in the socket handler is now more efficient. Commit 🔀 General improvements. Various improvements were implemented across the application to enhance performance, stability, and security. 🌐 Translation updates. Translations for German, Portuguese (Brazil), Simplified Chinese, Traditional Chinese, Catalan, and Spanish were enhanced and expanded. Fixed 🗄️ Database migration execution. Database migrations now run correctly on startup, fixing a circular import issue that caused schema updates to fail silently. #21848 , Commit 🔔 Notification HTML escaping. Notification messages now properly escape HTML content, matching the behavior in chat messages and ensuring consistent rendering across the interface. #21860 , Commit 🛠️ Tool call JSON error handling. Chat no longer crashes when models generate malformed JSON in tool call arguments; instead, a descriptive error message is returned to the model for retry. #21984 , Commit 🧠 Reasoning model KV cache preservation. Reasoning model thinking tags are no longer stored as HTML in the database, preserving KV cache efficiency for backends like llama.cpp and ensuring faster subsequent conversation turns. #21815 , Commit ⚡ Duplicate model execution prevention. Models are no longer called twice when no tools are configured, eliminating unnecessary API requests and reducing latency. #21802 , Commit 🔐 OAuth session database error. OAuth login no longer fails with a database error when creating sessions, fixing the \"'NoneType' object has no attribute 'id'\" and \"can't adapt type 'dict'\" errors that occurred during OAuth group creation. #21788 👤 User sharing permission enforcement. The user sharing option now correctly respects the USER_PERMISSIONS_ACCESS_GRANTS_ALLOW_USERS setting, fixing an issue where sharing to individual users was incorrectly allowed even when disabled. #21856 , Commit , Commit 🔑 Password manager autofill. Password manager autofill (like iCloud Passwords, 1Password, Bitwarden) now correctly captures filled-in passwords, fixing login failures where the password appeared filled but was sent as empty. #21869 , Commit 📝 RAG template duplication. RAG templates are no longer duplicated in chat messages when models make multiple tool calls, preventing hallucinations and incorrect tool usage. #21780 , Commit 📋 Audit log stdout. Audit logs now correctly appear on stdout when the ENABLE_AUDIT_STDOUT environment variable is set to true, aligning runtime behavior with the intended configuration. #21777 🎯 Function valve priority resolution. Function priorities defined in code are now correctly applied when no custom value has been saved in the database, ensuring consistent action button and filter ordering. #21841 📄 Web content knowledge base append. Processing web URLs with overwrite=false now correctly appends content to existing knowledge bases instead of silently doing nothing, fixing a regression where no content was being added. #21786 , Commit 🔍 Web search domain filter config. The WEB_SEARCH_DOMAIN_FILTER_LIST environment variable is now correctly read and applied, fixing an issue where domain filtering for web searches always used an empty default value. #21964 , #20186 🧹 Tooltip memory leak. Tooltip instances are now properly destroyed when elements change, fixing a memory leak that could cause performance issues over time. #21969 ⌨️ MessageInput memory leak. Event listeners in the message input component are now properly cleaned up, preventing a memory leak that could cause page crashes during extended use. #21968 📝 Notes memory leak. Event listeners in the Notes component are now properly cleaned up, fixing a memory leak that could cause page crashes during extended use. #21963 🏗️ Model create memory leak. Event listeners in the model creation page are now properly cleaned up, fixing a memory leak that could cause page crashes during extended use. #21966 💬 MentionList memory leak. Event listeners in the MentionList component are now properly cleaned up, fixing a memory leak that could cause page crashes during extended use. #21965 📐 Sidebar memory leak. Event listeners in the Sidebar component are now properly cleaned up, fixing a memory leak that could cause page crashes during extended use. #22082 🎨 Sidebar user menu positioning. The sidebar user menu no longer drifts rightward when the sidebar is resized, keeping the menu properly aligned with its trigger. #21853 💻 Code block UI. Code block headers are now sticky and properly positioned, with language labels now showing tooltips for truncated text. Commit 📊 Multi-model responses horizontal scroll. The model list in multi-model responses tabs now has horizontal scroll support, making all models accessible on desktop screens. #21800 , Commit 🎭 TailwindCSS gray color theme. Custom gray color palette is now correctly applied to the CSS root theme layer, fixing an issue where --color-gray-x variables were missing. #21900 , #21899 📎 Broken documentation links. Fixed broken links in the backend config and admin settings that pointed to outdated documentation locations. #21904 🔓 OAuth session token decryption. OAuth sessions are now properly detached from the database context before token decryption, preventing potential database session conflicts when reading encrypted tokens. #21794 🕐 Chat timestamp i18n fix. Chat timestamps in the sidebar now display correctly, fixing an issue where the time ago format (e.g., \"5m\", \"2h\", \"3d\") was not being localized properly due to incorrect variable casing in the translation function. Commit 🍞 Model toast notification fix. Hiding or showing a single model now displays only one toast notification instead of two, removing the redundant generic \"model updated\" message when a specific action toast is shown. #22079 📡 Offline mode embedding model fix. Open WebUI no longer attempts to download embedding models when in offline mode, fixing error logs that occurred when trying to fetch models that weren't cached locally. #22106 , #21405", "-", "-title=v0.8.5", "-updated=2026-02-23T09:26:34Z", "-link=https://github.com/open-webui/open-webui/releases/tag/v0.8.5", "-summary=", "-content=[0.8.5] - 2026-02-23 Added ⌨️ Voice dictation shortcut. Users can now toggle voice dictation using Cmd+Shift+L (or Ctrl+Shift+L on Windows/Linux), making it faster to start and stop dictation without clicking the microphone button. Fixed 🚫 Model access KeyError fix. The /api/models endpoint no longer crashes with a 500 error when models have incomplete info metadata missing the user_id field (e.g. models using global default metadata). 🔄 Frontend initialization resilience. The app layout now gracefully handles individual API failures during initia   <script>
    const archive = JSON.parse(document.getElementById('archive-data').textContent);
    const articleMapping = JSON.parse(document.getElementById('article-mapping').textContent);
    const perPage = 50;
    let page = 1;
    let categoryFilter = '';
    let sourceFilter = '';
    const listNode = document.getElementById('history-list');
    const pageState = document.getElementById('page-state');
    const prevButton = document.getElementById('prev-page');
    const nextButton = document.getElementById('next-page');
    const categorySelect = document.getElementById('category-filter');
    const sourceSelect = document.getElementById('source-filter');

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('en-US', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).format(date) + ' Taipei';
    }

    function uniqueValues(key) {
      return [...new Set(archive.map((item) => item[key]).filter(Boolean))].sort();
    }
    function fillSelect(select, values) {
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }
    fillSelect(categorySelect, uniqueValues('category'));
    fillSelect(sourceSelect, uniqueValues('source_name'));

    function filteredItems() {
      return archive.filter((item) => {
        if (categoryFilter && item.category !== categoryFilter) return false;
        if (sourceFilter && item.source_name !== sourceFilter) return false;
        return true;
      });
    }

    function render() {
      const items = filteredItems();
      const totalPages = Math.max(1, Math.ceil(items.length / perPage));
      page = Math.min(page, totalPages);
      const slice = items.slice((page - 1) * perPage, page * perPage);
      listNode.innerHTML = '';
      slice.forEach((item) => {
        // Look up standalone article page via stable keys
        let articleSlug = null;
        for (const key of ['article_identity', 'merge_key', 'id']) {
          const k = item[key];
          if (k && articleMapping[k]) {
            articleSlug = articleMapping[k];
            break;
          }
        }
        const articleUrl = articleSlug ? './articles/' + articleSlug + '.html' : null;
        const headline = articleUrl
          ? '<a href="' + articleUrl + '">' + item.headline_en + '</a>'
          : item.headline_en;
        const article = document.createElement('article');
        article.className = 'card';
        article.innerHTML = `
          <div class="row"><span class="pill">${item.category}</span><time>${formatTime(item.timestamp)}</time></div>
          <h2>${headline}</h2>
          <p>${item.summary_en}</p>
          <div class="row"><span>${item.source_name}</span><a href="${item.target_url || item.source_url || '#'}">Source</a></div>
        `;
        listNode.appendChild(article);
      });
      pageState.textContent = `Page ${page} / ${totalPages} - ${items.length} items`;
      prevButton.disabled = page <= 1;
      nextButton.disabled = page >= totalPages;
    }

    categorySelect.addEventListener('change', (event) => { categoryFilter = event.target.value; page = 1; render(); });
    sourceSelect.addEventListener('change', (event) => { sourceFilter = event.target.value; page = 1; render(); });
    prevButton.addEventListener('click', () => { page = Math.max(1, page - 1); render(); });
    nextButton.addEventListener('click', () => { page = page + 1; render(); });
    render();
  </script>
