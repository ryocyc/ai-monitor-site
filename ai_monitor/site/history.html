opy page 🙌 Welcome to OpenHands, a community focused on AI-driven development. We’d love for you to join us on Slack . There are a few ways to work with OpenHands: ​ OpenHands Software Agent SDK The SDK is a composable Python library that contains all of our agentic tech. It’s the engine that powers everything else below. Define agents in code, then run them locally, or scale to 1000s of agents in the cloud Check out the docs or view the source ​ OpenHands CLI The CLI is the easiest way to start using OpenHands. The experience will be familiar to anyone who has worked with e.g. Claude Code or Codex. You can power it with Claude, GPT, or any other LLM. Check out the docs or view the source ​ OpenHands Local GUI Use the Local GUI for running agents on your laptop. It comes with a REST API and a single-page React application. The experience will be familiar to anyone who has used Devin or Jules. Check out the docs or view the source in this repo. ​ OpenHands Cloud This is a commercial deployment of OpenHands GUI, running on hosted infrastructure. You can try it with a free by signing in with your GitHub account . OpenHands Cloud comes with source-available features and integrations: Deeper integrations with GitHub, GitLab, and Bitbucket Integrations with Slack, Jira, and Linear Multi-user support RBAC and permissions Collaboration features (e.g., conversation sharing) Usage reporting Budgeting enforcement ​ OpenHands Enterprise Large enterprises can work with us to self-host OpenHands Cloud in their own VPC, via Kubernetes. OpenHands Enterprise can also work with the CLI and SDK above. OpenHands Enterprise is source-available—you can see all the source code here in the enterprise/ directory, but you’ll need to purchase a license if you want to run it for more than one month. Enterprise contracts also come with extended support and access to our research team. Learn more at openhands.dev/enterprise ​ Everything Else Check out our Product Roadmap , and feel free to open   <script>
    const archive = JSON.parse(document.getElementById('archive-data').textContent);
    const articleMapping = JSON.parse(document.getElementById('article-mapping').textContent);
    const perPage = 50;
    let page = 1;
    let categoryFilter = '';
    let sourceFilter = '';
    const listNode = document.getElementById('history-list');
    const pageState = document.getElementById('page-state');
    const prevButton = document.getElementById('prev-page');
    const nextButton = document.getElementById('next-page');
    const categorySelect = document.getElementById('category-filter');
    const sourceSelect = document.getElementById('source-filter');

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('en-US', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).format(date) + ' Taipei';
    }

    function uniqueValues(key) {
      return [...new Set(archive.map((item) => item[key]).filter(Boolean))].sort();
    }
    function fillSelect(select, values) {
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }
    fillSelect(categorySelect, uniqueValues('category'));
    fillSelect(sourceSelect, uniqueValues('source_name'));

    function filteredItems() {
      return archive.filter((item) => {
        if (categoryFilter && item.category !== categoryFilter) return false;
        if (sourceFilter && item.source_name !== sourceFilter) return false;
        return true;
      });
    }

    function render() {
      const items = filteredItems();
      const totalPages = Math.max(1, Math.ceil(items.length / perPage));
      page = Math.min(page, totalPages);
      const slice = items.slice((page - 1) * perPage, page * perPage);
      listNode.innerHTML = '';
      slice.forEach((item) => {
        // Look up standalone article page via stable keys
        let articleSlug = null;
        for (const key of ['article_identity', 'merge_key', 'id']) {
          const k = item[key];
          if (k && articleMapping[k]) {
            articleSlug = articleMapping[k];
            break;
          }
        }
        const articleUrl = articleSlug ? './articles/' + articleSlug + '.html' : null;
        const headline = articleUrl
          ? '<a href="' + articleUrl + '">' + item.headline_en + '</a>'
          : item.headline_en;
        const article = document.createElement('article');
        article.className = 'card';
        article.innerHTML = `
          <div class="row"><span class="pill">${item.category}</span><time>${formatTime(item.timestamp)}</time></div>
          <h2>${headline}</h2>
          <p>${item.summary_en}</p>
          <div class="row"><span>${item.source_name}</span><a href="${item.target_url || item.source_url || '#'}">Source</a></div>
        `;
        listNode.appendChild(article);
      });
      pageState.textContent = `Page ${page} / ${totalPages} - ${items.length} items`;
      prevButton.disabled = page <= 1;
      nextButton.disabled = page >= totalPages;
    }

    categorySelect.addEventListener('change', (event) => { categoryFilter = event.target.value; page = 1; render(); });
    sourceSelect.addEventListener('change', (event) => { sourceFilter = event.target.value; page = 1; render(); });
    prevButton.addEventListener('click', () => { page = Math.max(1, page - 1); render(); });
    nextButton.addEventListener('click', () => { page = page + 1; render(); });
    render();
  </script>
