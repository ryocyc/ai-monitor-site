，支持所有编程语言和平台 官方 Python SDK 功能完整的 Python 开发工具包，支持异步调用和类型安全 官方 Java SDK 企业级 Java 开发工具包，支持高并发和高可用性 OpenAI SDK 兼容 兼容 OpenAI SDK，零学习成本快速迁移现有应用 LangChain 集成 集成 LangChain 框架，构建复杂的 AI 应用和智能代理 ​ 核心概念 GLM Token 上下文窗口 GLM - General Language Model GLM 是一款基于自回归填空的预训练语言模型。ChatGLM 系列模型，支持相对复杂的自然语言指令，并且能够解决困难的推理类问题。该模型配备了易于使用的 API 接口，允许开发者轻松将其融入各类应用，广泛应用于智能客服、虚拟主播、聊天机器人等诸多领域。 Token - 文本处理单位 Token 是模型用来表示自然语言文本的基本单位，可以直观的理解为“字”或“词”；通常 1 个中文词语、1 个英文单词、1 个数字或 1 个符号计为 1 个 token。 GLM 系列模型中 token 和字数的换算比例约为 1:1.6 ，但因为不同模型的分词不同，所以换算比例也存在差异，每一次实际处理 token 数量以模型返回为准，您可以从返回结果的 usage 中查看。 Context Window - 上下文窗口 上下文窗口是指模型在一次对话中能够处理的最大长度。包括： 用户输入的内容 模型生成的回复 模型在生成回复过程中进行推理或调用工具时产生的中间内容（如：GLM-4-AllTools ） 如果超出上下文窗口限制，会发生什么？ 超出部分被截断： 如果总文本量超过了上下文窗口的限制，超出的部分将被自动丢弃，无法被处理。 影响对话内容： 你可能看不到被丢弃的部分，从而影响模型的回答质量或上下文的连贯性。 查看模型的上下文限制，或者使用 Tokenizer 工具估算上下文长度。 重要提醒 ：以上内容主要适用于 GLM-4 系列语言模型。对于多模态模型，输入内容有严格长度限制，若超出限制，系统将提示”prompt 超长”。 模型概览 ⌘ I Powered by This documentation is built and hosted on Mintlify, a developer documentation platform update detected", "summary_en": "平台介绍 - 智谱AI开放文档 Skip to main content 智谱AI开放文档 home page Search... ⌘ K 控制台 价格 财务 API Key 个人中心 Search... Navigation 开始使用 平台介绍 使用指南 API 文档 场景示例 编码套餐 更新日志 条款与协议 常见问题 开始使用 平台介绍 模型概览 快速开始 核心参数 开发指南 迁移至 GLM-5.1 模型介绍 文本模型 视觉理解模型 图像生成模型 视频生成模型 音视频模型 向量模型 角...", "headline_zh": "", "summary_zh": "", "evidence_excerpt": "平台介绍 - 智谱AI开放文档 Skip to main content 智谱AI开放文档 home page Search... ⌘ K 控制台 价格 财务 API Key 个人中心 Search... Navigation 开始使用 平台介绍 使用指南 API 文档 场景示例 编码套餐 更新日志 条款与协议 常见问题 开始使用 平台介绍 模型概览 快速开始 核心参数 开发指南 迁移至 GLM-5.1 模型介绍 文本模型 视觉理解模型 图像生成模型 视频生成模型 音视频模型 向量模型 角色模型 免费模型 模型能力 深度思考 思考模式 流式消息 工具流式输出 工具调用 上下文缓存 结构化输出 模型工具 GLM in Excel（Beta） 联网搜索 模型部署 模型微调 模型评测 批量处理 文件解析 OCR 服务 GLM 全模态知识库 知识处理及检索 知识问答 知识库服务计费 上下文增强技术报告 对话调用知识库 智能体 语言翻译 内容生成 办公效能 信息提取 智慧教育 平台服务 智能体开发平台 提示词工程 内容安全 模型迁移 用户权益 模型备案 On this page 平台定位 平台优势 查看模型 极速体验 快速开始 开发指南 核心概念 开始使用 平台介绍 Copy page Z智谱·一站式大模型开发平台 Copy page ​ 平台定位 智谱大模型开放平台 bigmodel.cn ，提供功能丰富、灵活易用、高性价比的大模型 API 服务，支持智能体开发与模型精调、推理、评测等   <script>
    const archive = JSON.parse(document.getElementById('archive-data').textContent);
    const articleMapping = JSON.parse(document.getElementById('article-mapping').textContent);
    const perPage = 50;
    let page = 1;
    let categoryFilter = '';
    let sourceFilter = '';
    const listNode = document.getElementById('history-list');
    const pageState = document.getElementById('page-state');
    const prevButton = document.getElementById('prev-page');
    const nextButton = document.getElementById('next-page');
    const categorySelect = document.getElementById('category-filter');
    const sourceSelect = document.getElementById('source-filter');

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('en-US', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).format(date) + ' Taipei';
    }

    function uniqueValues(key) {
      return [...new Set(archive.map((item) => item[key]).filter(Boolean))].sort();
    }
    function fillSelect(select, values) {
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }
    fillSelect(categorySelect, uniqueValues('category'));
    fillSelect(sourceSelect, uniqueValues('source_name'));

    function filteredItems() {
      return archive.filter((item) => {
        if (categoryFilter && item.category !== categoryFilter) return false;
        if (sourceFilter && item.source_name !== sourceFilter) return false;
        return true;
      });
    }

    function render() {
      const items = filteredItems();
      const totalPages = Math.max(1, Math.ceil(items.length / perPage));
      page = Math.min(page, totalPages);
      const slice = items.slice((page - 1) * perPage, page * perPage);
      listNode.innerHTML = '';
      slice.forEach((item) => {
        // Look up standalone article page via stable keys
        let articleSlug = null;
        for (const key of ['article_identity', 'merge_key', 'id']) {
          const k = item[key];
          if (k && articleMapping[k]) {
            articleSlug = articleMapping[k];
            break;
          }
        }
        const articleUrl = articleSlug ? './articles/' + articleSlug + '.html' : null;
        const headline = articleUrl
          ? '<a href="' + articleUrl + '">' + item.headline_en + '</a>'
          : item.headline_en;
        const article = document.createElement('article');
        article.className = 'card';
        article.innerHTML = `
          <div class="row"><span class="pill">${item.category}</span><time>${formatTime(item.timestamp)}</time></div>
          <h2>${headline}</h2>
          <p>${item.summary_en}</p>
          <div class="row"><span>${item.source_name}</span><a href="${item.target_url || item.source_url || '#'}">Source</a></div>
        `;
        listNode.appendChild(article);
      });
      pageState.textContent = `Page ${page} / ${totalPages} - ${items.length} items`;
      prevButton.disabled = page <= 1;
      nextButton.disabled = page >= totalPages;
    }

    categorySelect.addEventListener('change', (event) => { categoryFilter = event.target.value; page = 1; render(); });
    sourceSelect.addEventListener('change', (event) => { sourceFilter = event.target.value; page = 1; render(); });
    prevButton.addEventListener('click', () => { page = Math.max(1, page - 1); render(); });
    nextButton.addEventListener('click', () => { page = page + 1; render(); });
    render();
  </script>
